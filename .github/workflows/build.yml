name: 多平台构建

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-2025
            artifact: grid-strategy-backtest-windows-x64
          - name: Linux x64
            runner: ubuntu-24.04
            artifact: grid-strategy-backtest-linux-x64
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            artifact: grid-strategy-backtest-linux-arm64
          - name: macOS Intel x64
            runner: macos-15-intel
            artifact: grid-strategy-backtest-macos-x64
          - name: macOS ARM64
            runner: macos-15
            artifact: grid-strategy-backtest-macos-arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: 安装 PyInstaller
        run: python -m pip install --upgrade pip pyinstaller==6.21.0

      - name: 运行完整测试
        run: python -m unittest discover -s tests -v

      - name: 构建并验证目录包
        run: python build_package.py --output artifacts

      - name: 上传平台压缩包
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/grid-strategy-backtest-*
          archive: false
          if-no-files-found: error
          retention-days: 14

  # 构建矩阵全部成功后，汇总平台文件并创建正式 GitHub Release。
  release:
    name: 发布 GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      # v8 支持下载 upload-artifact v7 的非压缩单文件产物。
      - name: 下载所有平台发布文件
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: grid-strategy-backtest-*
          merge-multiple: true

      # 使用 GitHub CLI 将五个平台文件直接挂到当前 Tag 的 Release Assets。
      - name: 创建 Release 并上传发布文件
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          # 直传 Artifact 下载后可能按 Artifact 名称保留目录，递归收集真实文件。
          mapfile -d '' RELEASE_FILES < <(find release-assets -type f -print0)
          if [ "${#RELEASE_FILES[@]}" -ne 5 ]; then
            echo "Expected 5 release files, found ${#RELEASE_FILES[@]}"
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${RELEASE_FILES[@]}" \
            --repo "$REPOSITORY" \
            --title "$RELEASE_TAG" \
            --generate-notes
