name: 发布 Docker 镜像到 GHCR

on:
  # main/master 推送和 v* Git 标签都会自动构建并推送镜像。
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  # 允许在 GitHub Actions 页面手动发布指定版本。
  workflow_dispatch:
    inputs:
      version:
        description: 发布版本号，例如 1.0.5；留空时仅生成默认标签
        required: false
        type: string

# GITHUB_TOKEN 只需要读取源码和写入当前仓库的 GHCR 包。
permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: 构建并推送镜像
    runs-on: ubuntu-latest

    steps:
      # 检出 Docker 构建上下文和应用源码。
      - name: 检出源码
        uses: actions/checkout@v5

      # 先执行标准库测试，测试失败时不推送不可用镜像。
      - name: 运行完整测试
        run: python -m unittest discover -s tests -v

      # 生成 UTC 时间戳，保留每次发布的不可变镜像版本。
      - name: 生成时间戳版本号
        id: image-version
        shell: bash
        run: echo "timestamp=$(date -u +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"

      # 为分支、Git 标签、手动版本和提交 SHA 生成可追溯镜像标签。
      - name: 生成镜像元数据
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.image-version.outputs.timestamp }}
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
            type=sha,prefix=sha-

      # 使用仓库内置令牌登录 GHCR，不在仓库中保存个人访问令牌。
      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 构建镜像并把标签、描述和源码关联信息推送到 GHCR。
      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
